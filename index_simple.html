<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch-Meister</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h1 { color: #333; }
        .levels { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .level-btn { padding: 12px 24px; background: #E8F0FE; border: 2px solid #D0D0D0; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .level-btn.active { background: #3B6FE0; color: white; border-color: #2B5BC7; }
        .content { background: white; border-radius: 12px; padding: 20px; min-height: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .lesson-btn { display: block; width: 100%; padding: 15px; margin: 8px 0; background: #E8F0FE; border: 2px solid #D0D0D0; border-radius: 8px; cursor: pointer; text-align: left; font-size: 16px; }
        .lesson-btn:hover { background: #d0e2fc; }
        .mode-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .mode-btn { padding: 10px 20px; background: #E8F0FE; border: 2px solid #D0D0D0; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: #3B6FE0; color: white; border-color: #2B5BC7; }
        .back-btn { padding: 10px 20px; background: #3B6FE0; color: white; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        .speak-btn { background: #4CAF50; color: white; border: none; border-radius: 20px; padding: 4px 12px; cursor: pointer; margin-left: 10px; }
        .vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .vocab-item { background: #f8f9fa; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .practice-item { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .practice-input { width: 100%; padding: 10px; border: 2px solid #D0D0D0; border-radius: 8px; margin: 8px 0; font-size: 16px; }
        .check-btn { padding: 8px 20px; background: #3B6FE0; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .result-correct { color: #4CAF50; font-weight: bold; }
        .result-wrong { color: #F44336; font-weight: bold; }
        .dictation-item { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; }
        @media (max-width: 768px) {
            .vocab-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🇩🇪 Deutsch-Meister</h1>
            <div class="levels" id="levelsContainer">
                <button class="level-btn active" data-level="A1">A1</button>
                <button class="level-btn" data-level="A2">A2</button>
                <button class="level-btn" data-level="B1">B1</button>
                <button class="level-btn" data-level="B2">B2</button>
                <button class="level-btn" data-level="C1">C1</button>
            </div>
        </div>
        <div class="content" id="content">
            <div style="text-align: center; padding: 40px; color: #999;">
                <div style="font-size: 48px; margin-bottom: 15px;">📚</div>
                <div>Выберите уровень</div>
            </div>
        </div>
    </div>

    <script>
        // ДАННЫЕ УРОКОВ
        const LESSONS = {
            A1: [
                {
                    id: 1,
                    title: "Знакомство. Глагол 'sein'.",
                    grammar: `
                        <h3>Глагол sein</h3>
                        <table border="1" cellpadding="8">
                            <tr><th>ich</th><td><strong>bin</strong></td></tr>
                            <tr><th>du</th><td><strong>bist</strong></td></tr>
                            <tr><th>er/sie/es</th><td><strong>ist</strong></td></tr>
                            <tr><th>wir</th><td><strong>sind</strong></td></tr>
                            <tr><th>ihr</th><td><strong>seid</strong></td></tr>
                            <tr><th>sie/Sie</th><td><strong>sind</strong></td></tr>
                        </table>
                    `,
                    examples: [
                        { de: "Ich bin Anna.", ru: "Я Анна." },
                        { de: "Du bist mein Freund.", ru: "Ты мой друг." }
                    ],
                    vocabulary: [
                        { de: "Hallo", ru: "Привет" },
                        { de: "Tschüss", ru: "Пока" },
                        { de: "der Mann", ru: "мужчина" },
                        { de: "die Frau", ru: "женщина" }
                    ],
                    practice: [
                        { question: "Вставьте форму sein:", sentence: "Ich ___ Anna.", answer: "bin", hint: "ich → bin" },
                        { question: "Вставьте форму sein:", sentence: "Du ___ mein Freund.", answer: "bist", hint: "du → bist" }
                    ],
                    dictation: [
                        { ru: "Я Анна.", de: "Ich bin Anna." },
                        { ru: "Ты мой друг.", de: "Du bist mein Freund." }
                    ]
                }
            ],
            A2: [], B1: [], B2: [], C1: []
        };

        let currentLevel = 'A1';
        let currentLesson = null;
        let currentMode = 'grammar';

        function speak(text) {
            if (!text || !window.speechSynthesis) return;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'de-DE';
            u.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(u);
        }

        function renderLevel(level) {
            currentLevel = level;
            const lessons = LESSONS[level] || [];
            let html = `<h2>Уровень ${level}</h2>`;
            if (lessons.length === 0) {
                html += `<div style="padding:20px;color:#999;">Уроков пока нет</div>`;
            } else {
                lessons.forEach(l => {
                    html += `<button class="lesson-btn" data-id="${l.id}">📘 Урок ${l.id}: ${l.title}</button>`;
                });
            }
            document.getElementById('content').innerHTML = html;
            document.querySelectorAll('.lesson-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = parseInt(btn.dataset.id);
                    renderLesson(level, id);
                };
            });
        }

        function renderLesson(level, id) {
            const lesson = LESSONS[level].find(l => l.id === id);
            if (!lesson) return;
            currentLesson = lesson;

            let html = `
                <button class="back-btn" onclick="renderLevel('${level}')">← Назад</button>
                <h2>${lesson.title}</h2>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="grammar">📘 Грамматика</button>
                    <button class="mode-btn" data-mode="vocabulary">📚 Слова</button>
                    <button class="mode-btn" data-mode="practice">✍️ Практика</button>
                    <button class="mode-btn" data-mode="dictation">✏️ Диктант</button>
                </div>
                <div id="modeContent"></div>
            `;
            document.getElementById('content').innerHTML = html;

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderMode(btn.dataset.mode, lesson);
                };
            });

            renderMode('grammar', lesson);
        }

        function renderMode(mode, lesson) {
            const container = document.getElementById('modeContent');
            if (!container) return;

            if (mode === 'grammar') {
                let html = lesson.grammar || '';
                if (lesson.examples) {
                    lesson.examples.forEach(ex => {
                        html += `<div style="background:#E8F0FE;padding:10px;margin:5px 0;border-radius:8px;">
                            <strong>${ex.de}</strong> — ${ex.ru}
                            <button class="speak-btn" onclick="speak('${ex.de}')">🔊</button>
                        </div>`;
                    });
                }
                container.innerHTML = html;
            }
            else if (mode === 'vocabulary') {
                let html = '<div class="vocab-grid">';
                (lesson.vocabulary || []).forEach(w => {
                    html += `<div class="vocab-item">
                        <span><strong>${w.de}</strong> — ${w.ru}</span>
                        <button class="speak-btn" onclick="speak('${w.de}')">🔊</button>
                    </div>`;
                });
                html += '</div>';
                container.innerHTML = html;
            }
            else if (mode === 'practice') {
                let html = '';
                (lesson.practice || []).forEach((ex, i) => {
                    html += `
                        <div class="practice-item">
                            <div>${ex.question}</div>
                            <div>${ex.sentence}</div>
                            <input class="practice-input" data-i="${i}" placeholder="Ответ...">
                            <button class="check-btn" data-i="${i}">Проверить</button>
                            <div class="practice-result" data-i="${i}"></div>
                            <div style="color:#999;">💡 ${ex.hint}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                container.querySelectorAll('.check-btn').forEach(btn => {
                    btn.onclick = () => {
                        const i = parseInt(btn.dataset.i);
                        const input = container.querySelector(`.practice-input[data-i="${i}"]`);
                        const result = container.querySelector(`.practice-result[data-i="${i}"]`);
                        const ex = lesson.practice[i];
                        if (input.value.trim().toLowerCase() === ex.answer.toLowerCase()) {
                            result.innerHTML = '✅ Правильно!';
                            result.style.color = '#4CAF50';
                        } else {
                            result.innerHTML = `❌ Правильно: ${ex.answer}`;
                            result.style.color = '#F44336';
                        }
                    };
                });
            }
            else if (mode === 'dictation') {
                let html = '';
                (lesson.dictation || []).forEach((d, i) => {
                    html += `
                        <div class="dictation-item">
                            <div><strong>${d.ru}</strong></div>
                            <input class="practice-input" data-di="${i}" placeholder="Перевод...">
                            <button class="check-btn" data-di="${i}">Проверить</button>
                            <div class="practice-result" data-di="${i}"></div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                container.querySelectorAll('.check-btn[data-di]').forEach(btn => {
                    btn.onclick = () => {
                        const i = parseInt(btn.dataset.di);
                        const input = container.querySelector(`.practice-input[data-di="${i}"]`);
                        const result = container.querySelector(`.practice-result[data-di="${i}"]`);
                        const d = lesson.dictation[i];
                        if (input.value.trim().toLowerCase() === d.de.toLowerCase()) {
                            result.innerHTML = '✅ Правильно!';
                            result.style.color = '#4CAF50';
                        } else {
                            result.innerHTML = `❌ Правильно: ${d.de}`;
                            result.style.color = '#F44336';
                        }
                    };
                });
            }
        }

        // Управление уровнями
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderLevel(btn.dataset.level);
            };
        });

        // Запуск
        renderLevel('A1');
    </script>
</body>
</html>
